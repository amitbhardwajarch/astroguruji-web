<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ASTROGURUJI</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    text-transform: uppercase;
}

.container {
    width: 1200px;
    margin: 10px auto;
    background: white;
    border: 2px solid black;
    padding: 10px;
}

/* HEADER */
.header {
    text-align: center;
    border-bottom: 2px solid black;
    padding-bottom: 5px;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

/* INPUT */
.input-row {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}

input, select {
    padding: 6px;
    border: 1px solid black;
}

button {
    background: gold;
    border: 1px solid black;
    font-weight: bold;
    cursor: pointer;
}

/* SUMMARY */
.summary {
    border: 1px solid black;
    margin-top: 10px;
    padding: 5px;
}

.summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
}

.summary-row {
    display: flex;
}

.summary-row div:first-child {
    width: 160px;
    font-weight: bold;
}

/* TABLE */
.table-box {
    border: 1px solid black;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 4px;
    font-size: 12px;
}

/* BOTTOM */
.bottom {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

/* CHART */
.chart {
    border: 1px solid black;
    padding: 5px;
}

.chart-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
}

.house {
    border: 1px solid black;
    height: 70px;
    font-size: 11px;
    padding: 3px;
}

.lagna {
    background: #ffe9a3;
}

/* DASA */
.dasa {
    border: 1px solid black;
    padding: 5px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>ASTROGURUJI</h1>
    <div>INSTANT HOROSCOPE DISPLAY</div>
</div>

<div class="input-row">
    <input id="name" placeholder="NAME">
    <input id="day" placeholder="DD">
    <input id="month" placeholder="MM">
    <input id="year" placeholder="YYYY">
    <input id="hour" placeholder="HH">
    <input id="minute" placeholder="MM">

    <select id="state" onchange="loadCities()"></select>
    <select id="city"></select>

    <button onclick="calculate()">SHOW</button>
</div>

<div class="summary">
    <b>HOROSCOPE SUMMARY</b>
    <div id="summary" class="summary-grid"></div>
</div>

<div class="table-box">
    <b>NINE PLANETS POSITION</b>
    <div id="planets"></div>
</div>

<div class="bottom">

    <div class="chart">
        <b>RASI CHART</b>
        <div id="chart" class="chart-grid"></div>
    </div>

    <div class="dasa">
        <b>DASA DETAILS</b>
        <div id="dasa"></div>
    </div>

</div>

</div>

<script src="india_locations.js"></script>

<script>

const API = "https://astrology-api-ng94.onrender.com/calculate";

function loadStates() {
    let s = document.getElementById("state");
    s.innerHTML = "<option>STATE</option>";

    Object.keys(INDIA_LOCATIONS).forEach(st => {
        let o = document.createElement("option");
        o.value = st;
        o.textContent = st;
        s.appendChild(o);
    });
}

function loadCities() {
    let st = document.getElementById("state").value;
    let c = document.getElementById("city");

    c.innerHTML = "<option>CITY</option>";

    INDIA_LOCATIONS[st].forEach(city => {
        let o = document.createElement("option");
        o.value = city;
        o.textContent = city;
        c.appendChild(o);
    });
}

async function calculate() {

    let dob = document.getElementById("year").value + "-" +
              document.getElementById("month").value + "-" +
              document.getElementById("day").value;

    let tob = document.getElementById("hour").value + ":" +
              document.getElementById("minute").value;

    let city = document.getElementById("city").value;
    let state = document.getElementById("state").value;

    let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city},${state}`);
    let g = await geo.json();

    let lat = g[0].lat;
    let lon = g[0].lon;

    let res = await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            dob: dob,
            tob: tob,
            tz: 5.5,
            lat: lat,
            lon: lon
        })
    });

    let data = await res.json();

    renderSummary(data);
    renderPlanets(data);
    renderChart(data);
    renderDasa(data);
}

function renderSummary(d) {
    let html = `
    <div class="summary-row"><div>NAKSHATRA</div><div>${d.nakshatra}</div></div>
    <div class="summary-row"><div>DASA LORD</div><div>${d.dasha_lord}</div></div>
    <div class="summary-row"><div>LAGNA</div><div>${d.lagna.sign}</div></div>
    `;
    document.getElementById("summary").innerHTML = html;
}

function renderPlanets(d) {
    let html = "<table><tr><th>PLANET</th><th>SIGN</th></tr>";

    for (let p in d.graha_positions) {
        html += `<tr><td>${p}</td><td>${d.graha_positions[p].sign}</td></tr>`;
    }

    html += "</table>";
    document.getElementById("planets").innerHTML = html;
}

function renderChart(d) {
    let signs = ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"];
    let html = "";

    signs.forEach(s => {
        let content = d.chart[s] || [];
        let lagna = content.includes("Lagna") ? "lagna" : "";

        html += `<div class="house ${lagna}">${s}<br>${content}</div>`;
    });

    document.getElementById("chart").innerHTML = html;
}

function renderDasa(d) {
    let html = `
    BALANCE: ${d.balance.years}Y ${d.balance.months}M ${d.balance.days}D
    `;
    document.getElementById("dasa").innerHTML = html;
}

loadStates();

</script>

</body>
</html>
