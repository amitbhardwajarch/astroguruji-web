<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASTROGURUJI</title>

    <style>
        * {
            box-sizing: border-box;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0b1220 0%, #1d3d8f 100%);
            color: #fff;
            padding: 10px;
        }

        .app {
            max-width: 1500px;
            margin: 0 auto;
            background: rgba(17, 24, 39, 0.94);
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 0 22px rgba(0,0,0,0.35);
        }

        .brand {
            text-align: center;
            margin-bottom: 10px;
        }

        .brand-title {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(90deg, #ffd54a, #ff8a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .brand-subtitle {
            color: #cbd5f5;
            font-size: 12px;
            margin-top: 2px;
        }

        .top-form {
            display: grid;
            grid-template-columns: 1.2fr 0.55fr 0.55fr 0.75fr 0.55fr 0.55fr 1fr 1fr 0.9fr;
            gap: 8px;
            align-items: end;
            margin-bottom: 10px;
        }

        .field {
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 11px;
            color: #cbd5f5;
            margin-bottom: 4px;
            font-weight: 700;
        }

        input, select, button {
            width: 100%;
            padding: 10px 8px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        input, select {
            background: #334155;
            color: #fff;
        }

        button {
            background: linear-gradient(90deg, #ff8a00, #ffd54a);
            color: #111827;
            font-weight: 800;
            cursor: pointer;
            height: 38px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.05fr 1.05fr 1fr;
            gap: 10px;
        }

        .panel {
            background: #020817;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px;
            overflow: hidden;
        }

        .panel-title {
            color: #ffd54a;
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .summary-item {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 8px;
            min-height: 58px;
        }

        .summary-k {
            color: #93c5fd;
            font-size: 10px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .summary-v {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            word-break: break-word;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        th, td {
            border: 1px solid rgba(255,255,255,0.10);
            padding: 6px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #1e293b;
            color: #ffd54a;
            font-weight: 800;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .chart-cell {
            min-height: 62px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 6px;
        }

        .chart-sign {
            color: #ffd54a;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .chart-content {
            font-size: 11px;
            line-height: 1.35;
        }

        .lagna-cell {
            background: #3b2f00;
            border-color: #ffd54a;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .status-bar {
            margin-top: 10px;
            background: #0f172a;
            color: #cbd5f5;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
        }

        .note {
            margin-top: 6px;
            color: #cbd5f5;
            font-size: 11px;
        }

        @media (max-width: 1300px) {
            .top-form {
                grid-template-columns: repeat(3, 1fr);
            }
            .main-grid, .bottom-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="brand">
            <div class="brand-title">ASTROGURUJI</div>
            <div class="brand-subtitle">ANCIENT WISDOM • MODERN TECHNOLOGY</div>
        </div>

        <div class="top-form">
            <div class="field">
                <label>NAME</label>
                <input type="text" id="name" placeholder="ENTER NAME">
            </div>

            <div class="field">
                <label>DAY</label>
                <input type="number" id="day" placeholder="DD" min="1" max="31">
            </div>

            <div class="field">
                <label>MONTH</label>
                <input type="number" id="month" placeholder="MM" min="1" max="12">
            </div>

            <div class="field">
                <label>YEAR</label>
                <input type="number" id="year" placeholder="YYYY" min="1800" max="2100">
            </div>

            <div class="field">
                <label>HOUR</label>
                <input type="number" id="hour" placeholder="HH" min="0" max="23">
            </div>

            <div class="field">
                <label>MINUTE</label>
                <input type="number" id="minute" placeholder="MM" min="0" max="59">
            </div>

            <div class="field">
                <label>STATE</label>
                <select id="state" onchange="loadCities()">
                    <option value="">SELECT STATE</option>
                </select>
            </div>

            <div class="field">
                <label>CITY</label>
                <select id="city">
                    <option value="">SELECT CITY</option>
                </select>
            </div>

            <div class="field">
                <label>&nbsp;</label>
                <button onclick="calculateHoroscope()">GENERATE</button>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">HOROSCOPE SUMMARY</div>
                <div id="summaryPanel" class="summary-grid"></div>
            </div>

            <div class="panel">
                <div class="panel-title">NINE PLANETS</div>
                <div id="planetTable"></div>
                <div class="note">NAKSHATRA / NAKSHATRA LORD WILL APPEAR WHEN BACKEND RETURNS THEM FOR EACH PLANET.</div>
            </div>

            <div class="panel">
                <div class="panel-title">RASI / SIGN CHART</div>
                <div id="chartPanel" class="chart-grid"></div>
            </div>
        </div>

        <div class="bottom-grid">
            <div class="panel">
                <div class="panel-title">CURRENT DASA / BALANCE</div>
                <div id="dasaPanel"></div>
            </div>

            <div class="panel">
                <div class="panel-title">MAHADASHA SEQUENCE</div>
                <div id="mahadashaTable"></div>
            </div>
        </div>

        <div class="panel" style="margin-top:10px;">
            <div class="panel-title">ANTARDASHA SEQUENCE</div>
            <div id="antardashaTable"></div>
        </div>

        <div id="statusBar" class="status-bar">READY.</div>
    </div>

    <script src="india_locations.js"></script>
    <script>
        const API_URL = "https://astrology-api-ng94.onrender.com/calculate";
        const COUNTRY_NAME = "INDIA";

        function pad2(v) {
            return String(v).padStart(2, "0");
        }

        function safeValue(v, fallback = "N/A") {
            return (v === undefined || v === null || v === "") ? fallback : v;
        }

        function buildDob() {
            const day = pad2(document.getElementById("day").value.trim());
            const month = pad2(document.getElementById("month").value.trim());
            const year = document.getElementById("year").value.trim();
            return `${year}-${month}-${day}`;
        }

        function buildTob() {
            const hour = pad2(document.getElementById("hour").value.trim());
            const minute = pad2(document.getElementById("minute").value.trim());
            return `${hour}:${minute}`;
        }

        function loadStates() {
            const stateSelect = document.getElementById("state");
            stateSelect.innerHTML = '<option value="">SELECT STATE</option>';

            const states = Object.keys(INDIA_LOCATIONS).sort();
            for (const state of states) {
                const option = document.createElement("option");
                option.value = state;
                option.textContent = state;
                stateSelect.appendChild(option);
            }
        }

        function loadCities() {
            const state = document.getElementById("state").value;
            const citySelect = document.getElementById("city");
            citySelect.innerHTML = '<option value="">SELECT CITY</option>';

            if (!state || !INDIA_LOCATIONS[state]) return;

            const cities = INDIA_LOCATIONS[state].sort();
            for (const city of cities) {
                const option = document.createElement("option");
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            }
        }

        async function getCoordinates(city, state) {
            const query = `${city}, ${state}, ${COUNTRY_NAME}`;
            const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(query);

            const response = await fetch(url);
            const data = await response.json();

            if (!data || data.length === 0) {
                throw new Error("CITY / STATE NOT FOUND.");
            }

            return {
                lat: parseFloat(data[0].lat),
                lon: parseFloat(data[0].lon)
            };
        }

        function getCurrentRange(items) {
            if (!items || !items.length) return null;
            const now = new Date();

            for (const item of items) {
                const start = new Date(item.start);
                const end = new Date(item.end);
                if (now >= start && now <= end) return item;
            }

            return items[0];
        }

        function renderSummary(data, personName, birthPlace, dob, tob) {
            const currentMaha = getCurrentRange(data.mahadasha_sequence);
            const currentAntar = getCurrentRange(data.remaining_antardasha_sequence);

            const items = [
                ["NAME", personName || "N/A"],
                ["DATE OF BIRTH", dob],
                ["TIME OF BIRTH", tob],
                ["PLACE OF BIRTH", birthPlace],
                ["LAGNA", `${safeValue(data.lagna?.sign)} ${safeValue(data.lagna?.degree_in_sign)}°`],
                ["MOON SIGN", safeValue(data.graha_positions?.Moon?.sign)],
                ["NAKSHATRA", safeValue(data.core_result?.nakshatra)],
                ["NAKSHATRA LORD", safeValue(data.core_result?.dasha_lord)],
                ["BALANCE OF DASA", `${safeValue(data.core_result?.balance?.years, 0)}Y ${safeValue(data.core_result?.balance?.months, 0)}M ${safeValue(data.core_result?.balance?.days, 0)}D`],
                ["CURRENT MAHADASHA", currentMaha ? `${currentMaha.lord}` : "N/A"],
                ["CURRENT ANTARDASHA", currentAntar ? `${currentAntar.lord}` : "N/A"],
                ["MOON LONGITUDE", safeValue(data.core_result?.moon_longitude)]
            ];

            return items.map(([k, v]) => `
                <div class="summary-item">
                    <div class="summary-k">${k}</div>
                    <div class="summary-v">${v}</div>
                </div>
            `).join("");
        }

        function renderPlanetTable(data) {
            const planets = data.graha_positions || {};
            const rows = Object.entries(planets).map(([planet, p]) => `
                <tr>
                    <td>${planet}</td>
                    <td>${safeValue(p.longitude)}°</td>
                    <td>${safeValue(p.sign)}</td>
                    <td>${safeValue(p.degree_in_sign)}°</td>
                    <td>${safeValue(p.nakshatra)}</td>
                    <td>${safeValue(p.nakshatra_lord)}</td>
                </tr>
            `).join("");

            return `
                <table>
                    <thead>
                        <tr>
                            <th>PLANET</th>
                            <th>LONGITUDE</th>
                            <th>SIGN</th>
                            <th>SIGN DEGREE</th>
                            <th>NAKSHATRA</th>
                            <th>NAKSHATRA LORD</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderDasaPanel(data) {
            const currentMaha = getCurrentRange(data.mahadasha_sequence);
            const currentAntar = getCurrentRange(data.remaining_antardasha_sequence);

            return `
                <table>
                    <thead>
                        <tr>
                            <th>FIELD</th>
                            <th>VALUE</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>PRESENT DASA RUNNING</td><td>${currentMaha ? currentMaha.lord : "N/A"}</td></tr>
                        <tr><td>CURRENT ANTARDASA</td><td>${currentAntar ? currentAntar.lord : "N/A"}</td></tr>
                        <tr><td>BALANCE OF VIMSHOTTARI DASA</td><td>${safeValue(data.core_result?.balance?.years, 0)}Y ${safeValue(data.core_result?.balance?.months, 0)}M ${safeValue(data.core_result?.balance?.days, 0)}D</td></tr>
                        <tr><td>MAHADASHA LORD</td><td>${safeValue(data.core_result?.dasha_lord)}</td></tr>
                    </tbody>
                </table>
            `;
        }

        function renderMahaTable(data) {
            const seq = data.mahadasha_sequence || [];
            const rows = seq.map(item => `
                <tr>
                    <td>${item.lord}</td>
                    <td>${item.start}</td>
                    <td>${item.end}</td>
                </tr>
            `).join("");

            return `
                <table>
                    <thead>
                        <tr>
                            <th>LORD</th>
                            <th>START</th>
                            <th>END</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderAntarTable(data) {
            const seq = data.remaining_antardasha_sequence || [];
            const rows = seq.map(item => `
                <tr>
                    <td>${item.lord}</td>
                    <td>${item.start}</td>
                    <td>${item.end}</td>
                </tr>
            `).join("");

            return `
                <table>
                    <thead>
                        <tr>
                            <th>LORD</th>
                            <th>START</th>
                            <th>END</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderChart(data) {
            const chart = data.chart || {};
            const signOrder = [
                "ARIES", "TAURUS", "GEMINI", "CANCER",
                "LEO", "VIRGO", "LIBRA", "SCORPIO",
                "SAGITTARIUS", "CAPRICORN", "AQUARIUS", "PISCES"
            ];

            return signOrder.map(sign => {
                const key = sign.charAt(0) + sign.slice(1).toLowerCase();
                const content = chart[key] || [];
                const isLagna = content.includes("Lagna");

                return `
                    <div class="chart-cell ${isLagna ? "lagna-cell" : ""}">
                        <div class="chart-sign">${sign}</div>
                        <div class="chart-content">${content.length ? content.join(", ") : "-"}</div>
                    </div>
                `;
            }).join("");
        }

        async function calculateHoroscope() {
            const statusBar = document.getElementById("statusBar");
            const name = document.getElementById("name").value.trim();
            const state = document.getElementById("state").value.trim();
            const city = document.getElementById("city").value.trim();

            try {
                if (!document.getElementById("day").value.trim() ||
                    !document.getElementById("month").value.trim() ||
                    !document.getElementById("year").value.trim() ||
                    !document.getElementById("hour").value.trim() ||
                    !document.getElementById("minute").value.trim() ||
                    !state || !city) {
                    throw new Error("PLEASE ENTER ALL REQUIRED FIELDS.");
                }

                const dob = buildDob();
                const tob = buildTob();
                const birthPlace = `${city}, ${state}, INDIA`;

                statusBar.textContent = "FETCHING COORDINATES...";
                const coords = await getCoordinates(city, state);

                statusBar.textContent = "GENERATING HOROSCOPE...";
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        dob: dob,
                        tob: tob,
                        tz: 5.5,
                        lat: coords.lat,
                        lon: coords.lon
                    })
                });

                const data = await response.json();

                if (!data.core_result) {
                    throw new Error("INVALID RESPONSE FROM SERVER.");
                }

                document.getElementById("summaryPanel").innerHTML = renderSummary(data, name, birthPlace, dob, tob);
                document.getElementById("planetTable").innerHTML = renderPlanetTable(data);
                document.getElementById("dasaPanel").innerHTML = renderDasaPanel(data);
                document.getElementById("mahadashaTable").innerHTML = renderMahaTable(data);
                document.getElementById("antardashaTable").innerHTML = renderAntarTable(data);
                document.getElementById("chartPanel").innerHTML = renderChart(data);

                statusBar.textContent = "HOROSCOPE GENERATED SUCCESSFULLY.";
            } catch (error) {
                statusBar.textContent = "ERROR: " + error.message;
                document.getElementById("summaryPanel").innerHTML = "";
                document.getElementById("planetTable").innerHTML = "";
                document.getElementById("dasaPanel").innerHTML = "";
                document.getElementById("mahadashaTable").innerHTML = "";
                document.getElementById("antardashaTable").innerHTML = "";
                document.getElementById("chartPanel").innerHTML = "";
            }
        }

        window.onload = loadStates;
    </script>
</body>
</html>
