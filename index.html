<!DOCTYPE html>
<html>
<head>
    <title>AstroGuruji</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .logo {
            font-size: 38px;
            font-weight: bold;
            margin-top: 20px;
            background: linear-gradient(90deg, #facc15, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 14px;
            color: #cbd5f5;
            margin-bottom: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: rgba(30, 41, 59, 0.92);
            border-radius: 16px;
        }

        .form-box {
            max-width: 420px;
            margin: auto;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        input, select {
            background: #334155;
            color: white;
        }

        button {
            background: linear-gradient(90deg, #f97316, #facc15);
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            text-align: left;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="logo">🔮 AstroGuruji</div>
<div class="tagline">Ancient Wisdom • Modern Technology</div>

<div class="container">

    <div class="form-box">
        <input type="date" id="dob">
        <input type="time" id="tob">

        <select id="state" onchange="loadCities()">
            <option>Select State</option>
        </select>

        <select id="city">
            <option>Select City</option>
        </select>

        <button onclick="calculate()">✨ Calculate Horoscope</button>
    </div>

    <div class="result" id="result">Loading India data...</div>

</div>

<script>

const API_URL = "https://astrology-api-ng94.onrender.com/calculate";
let allStates = [];

// 🚀 Load full India dataset
async function loadData() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/dr5hn/countries-states-cities-database/master/json/countries+states+cities.json");
        const data = await res.json();

        const india = data.find(c => c.name === "India");
        allStates = india.states;

        loadStates();

        document.getElementById("result").innerHTML = "Ready ✔ Select your details";

    } catch (err) {
        document.getElementById("result").innerHTML = "Error loading India data";
    }
}

// Load states
function loadStates() {
    const stateSelect = document.getElementById("state");
    stateSelect.innerHTML = '<option>Select State</option>';

    allStates.forEach(state => {
        let opt = document.createElement("option");
        opt.value = state.name;
        opt.textContent = state.name;
        stateSelect.appendChild(opt);
    });
}

// Load cities
function loadCities() {
    const stateName = document.getElementById("state").value;
    const citySelect = document.getElementById("city");

    citySelect.innerHTML = '<option>Select City</option>';

    const state = allStates.find(s => s.name === stateName);
    if (!state) return;

    state.cities.forEach(city => {
        let opt = document.createElement("option");
        opt.value = city.name;
        opt.textContent = city.name;
        citySelect.appendChild(opt);
    });
}

// Get coordinates
async function getCoordinates(city, state) {
    const query = `${city}, ${state}, India`;

    const res = await fetch(
        "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(query)
    );

    const data = await res.json();

    if (!data.length) throw new Error("Location not found");

    return {
        lat: parseFloat(data[0].lat),
        lon: parseFloat(data[0].lon)
    };
}

// Calculate horoscope
async function calculate() {
    const dob = document.getElementById("dob").value;
    const tob = document.getElementById("tob").value;
    const state = document.getElementById("state").value;
    const city = document.getElementById("city").value;

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "🔄 Calculating...";

    try {
        const coords = await getCoordinates(city, state);

        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                dob, tob,
                tz: 5.5,
                lat: coords.lat,
                lon: coords.lon
            })
        });

        const data = await res.json();

        resultDiv.innerHTML = `
            <h3>🌟 Result</h3>
            Moon Longitude: ${data.core_result.moon_longitude}<br>
            Nakshatra: ${data.core_result.nakshatra}<br>
            Dasha Lord: ${data.core_result.dasha_lord}<br>
            Balance: ${data.core_result.balance.years}y 
                     ${data.core_result.balance.months}m 
                     ${data.core_result.balance.days}d
        `;

    } catch (e) {
        resultDiv.innerHTML = "❌ Error: " + e.message;
    }
}

// Load on start
window.onload = loadData;

</script>

</body>
</html>
