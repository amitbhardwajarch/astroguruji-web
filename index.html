<!DOCTYPE html>
<html>
<head>
<title>ASTROGURUJI</title>

<style>
body { font-family: Arial; background:#eee; text-transform:uppercase; }
.container { width:1200px; margin:auto; background:white; border:2px solid black; padding:10px; }
.header { text-align:center; border-bottom:2px solid black; }
.row { display:flex; gap:5px; margin-top:5px; }
input,select { border:1px solid black; padding:5px; }
button { background:gold; font-weight:bold; border:1px solid black; }
.section { border:1px solid black; margin-top:10px; padding:5px; }
.chart { display:grid; grid-template-columns:repeat(4,1fr); }
.house { border:1px solid black; height:70px; font-size:11px; }
</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>ASTROGURUJI</h2>
</div>

<div class="row">
<input id="name" placeholder="NAME">
<input id="day" placeholder="DD">
<input id="month" placeholder="MM">
<input id="year" placeholder="YYYY">
<input id="hour" placeholder="HH">
<input id="minute" placeholder="MM">

<select id="state"></select>
<select id="city"></select>

<button onclick="calc()">SHOW</button>
</div>

<div class="section" id="summary"></div>
<div class="section" id="planets"></div>
<div class="section chart" id="chart"></div>

</div>

<script>

const API="https://astrology-api-ng94.onrender.com";

/* STATES */
async function loadStates(){
let r=await fetch(API+"/locations/states");
let d=await r.json();

let s=document.getElementById("state");
d.forEach(st=>{
let o=document.createElement("option");
o.value=st;
o.text=st;
s.appendChild(o);
});
}

/* CITIES */
state.onchange=async function(){
let r=await fetch(API+"/locations/cities?state="+this.value);
let d=await r.json();

city.innerHTML="";
d.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.text=c;
city.appendChild(o);
});
}

/* CALC */
async function calc(){

let dob=`${year.value}-${month.value}-${day.value}`;
let tob=`${hour.value}:${minute.value}`;

let geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city.value},${state.value}`);
let g=await geo.json();

let lat=g[0].lat;
let lon=g[0].lon;

let res=await fetch(API+"/calculate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({dob,tob,tz:5.5,lat,lon})
});

let data=await res.json();

summary.innerHTML=`NAKSHATRA: ${data.core_result.nakshatra}<br>DASA: ${data.core_result.dasha_lord}`;

let html="<table>";
for(let p in data.graha_positions){
html+=`<tr><td>${p}</td><td>${data.graha_positions[p].sign}</td></tr>`;
}
html+="</table>";

planets.innerHTML=html;

let ch="";
for(let s in data.chart){
ch+=`<div class="house">${s}<br>${data.chart[s]}</div>`;
}
chart.innerHTML=ch;

}

loadStates();

</script>

</body>
</html>
